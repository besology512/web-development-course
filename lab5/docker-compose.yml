services:
  db:
    image: mongo:latest
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    ports:
      - "5002:5000"
    environment:
      - PORT=5000
      - DATABASE=mongodb://db:27017/lab3db
      - JWT_SECRET=mySuperSecretKey
      - JWT_EXPIRES_IN=1d
    depends_on:
      - db

volumes:
  mongo-data:
