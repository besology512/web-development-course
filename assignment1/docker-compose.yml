version: '3.8'

services:
  mongo:
    image: mongo:latest
    ports:
      - '27101:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/flight-booking
      - JWT_SECRET=supersecretkey_dev_assignment1
      - MAILTRAP_USER=3134c050f9da8b
      - MAILTRAP_PASS=0dcfd62d0fb6f7
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  mongo-data:
