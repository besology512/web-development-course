version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: clipsphere_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    container_name: clipsphere_app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/clipsphere
      - JWT_SECRET=your_docker_secret_key_here
      - JWT_EXPIRES_IN=24h
      - NODE_ENV=development
    depends_on:
      - mongodb

volumes:
  mongodb_data:
