version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: clipsphere_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: clipsphere_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: clipsphere_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: clipsphere_app
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/clipsphere
      JWT_SECRET: clipsphere_docker_secret_2026
      JWT_EXPIRES_IN: 24h
      NODE_ENV: development
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: clipsphere-videos
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    depends_on:
      - mongodb
      - minio
      - redis

volumes:
  mongodb_data:
  minio_data:
  redis_data:
