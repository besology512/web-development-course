services:
  mongodb:
    image: mongo:7
    container_name: clipsphere_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  minio:
    image: minio/minio
    container_name: clipsphere_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio_init:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb -p local/clipsphere-videos || true &&
      mc anonymous set download local/clipsphere-videos || true
      "

  redis:
    image: redis:7-alpine
    container_name: clipsphere_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./clipsphere-backend
    container_name: clipsphere_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
      MONGODB_URI: mongodb://mongodb:27017/clipsphere
      JWT_SECRET: clipsphere_secret_2026_dev
      JWT_EXPIRES_IN: 24h
      ADMIN_USERNAME: clipsphereadmin
      ADMIN_EMAIL: admin@clipsphere.com
      ADMIN_PASSWORD: Admin1234!
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: clipsphere-videos
      MINIO_PUBLIC_BASE: http://localhost:3000/storage
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: kenyon97@ethereal.email
      SMTP_PASS: JjFWSKQgweP6PyVMwG
      SMTP_FROM: kenyon97@ethereal.email
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    depends_on:
      - mongodb
      - minio
      - minio_init
      - redis

  worker:
    build:
      context: ./clipsphere-backend
    container_name: clipsphere_worker
    command: node worker.js
    environment:
      CLIENT_URL: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: kenyon97@ethereal.email
      SMTP_PASS: JjFWSKQgweP6PyVMwG
      SMTP_FROM: kenyon97@ethereal.email
    depends_on:
      - redis

  frontend:
    build:
      context: ./clipsphere-frontend
    container_name: clipsphere_frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:5000
      STORAGE_URL: http://minio:9000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: clipsphere_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - minio

volumes:
  mongodb_data:
  minio_data:
